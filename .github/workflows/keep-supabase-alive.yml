name: Keep Supabase Alive

on:
  schedule:
    # Cada 2 dias a las 12:00 UTC
    - cron: '0 12 */2 * *'
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase to keep the project active..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/presupuestos?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_KEY }}")
          echo "HTTP status: $HTTP_CODE"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
            echo "Supabase respondio correctamente. Proyecto activo."
          else
            echo "Respuesta inesperada de Supabase (HTTP $HTTP_CODE)."
            exit 1
          fi
