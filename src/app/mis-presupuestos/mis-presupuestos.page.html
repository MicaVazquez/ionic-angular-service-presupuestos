<ion-header [translucent]="true">
  <ion-toolbar class="toolbar-presupuestos">
    <div class="header-shell">
      <ion-buttons class="menu-shell">
        <ion-menu-button></ion-menu-button>
      </ion-buttons>
      <ion-title>Mis<br />Presupuestos</ion-title>
      <button class="header-search" type="button" aria-label="Buscar">
        <span aria-hidden="true">&#9906;</span>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="buscador-wrapper">
    <div class="buscador">
      <span class="search-icon" aria-hidden="true">&#9906;</span>
      <input
        type="text"
        [(ngModel)]="busqueda"
        (ngModelChange)="filtrarPresupuestos()"
        placeholder="Buscar por cliente o material..."
        class="input-busqueda"
      />
    </div>
  </div>

  <!-- Spinner de carga -->
  <div class="spinner-wrapper" *ngIf="cargando">
    <ion-spinner name="crescent"></ion-spinner>
    <p class="spinner-texto">Cargando presupuestos...</p>
  </div>

  <div class="lista-presupuestos" *ngIf="!cargando">
    <div
      class="card-presupuesto"
      *ngFor="let presupuesto of presupuestosFiltrados"
    >
      <div class="card-resumen">
        <div class="cliente-bloque">
          <span class="card-label">CLIENTE</span>
          <h2 class="cliente-nombre">{{ presupuesto.cliente }}</h2>
          <span class="fecha-creacion">{{ formatearFecha(presupuesto.fecha) }}</span>
        </div>
        <div class="total-bloque">
          <span class="card-label">INVERSION TOTAL</span>
          <strong class="total-monto">
            ${{ formatearMonto(getTotalPresupuesto(presupuesto)) }}
          </strong>
        </div>
      </div>

      <div class="card-acciones">
        <button
          class="btn btn-editar"
          (click)="editarPresupuesto(presupuesto)"
        >
          <span class="btn-icono" aria-hidden="true">&#9998;</span>
          Editar
        </button>
        <button class="btn btn-pdf" (click)="descargarPDF(presupuesto)">
          <span class="btn-icono" aria-hidden="true">&#8681;</span>
          PDF
        </button>
        <button
          class="btn btn-whatsapp"
          (click)="compartirWhatsApp(presupuesto)"
        >
          <span class="btn-icono" aria-hidden="true">&#9993;</span>
          WhatsApp
        </button>
        <button
          class="btn btn-eliminar"
          (click)="eliminarPresupuesto(presupuesto)"
        >
          <span class="btn-icono" aria-hidden="true">&#128465;</span>
          Eliminar
        </button>
      </div>
    </div>

    <div class="empty-state" *ngIf="presupuestosFiltrados.length === 0">
      <p>No se encontraron presupuestos.</p>
    </div>
  </div>


  <button
    class="btn-flotante"
    type="button"
    (click)="nuevoPresupuesto()"
    aria-label="Crear presupuesto"
  >
    +
  </button>
</ion-content>
