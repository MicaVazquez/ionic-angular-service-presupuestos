<ion-content class="login-content">
  <div class="login-container">

    <div class="login-header">
      <div class="logo">
        <ion-icon name="document-text"></ion-icon>
      </div>
      <h1 class="login-title">CPV</h1>
      <p class="login-subtitle">Presupuestos</p>
    </div>

    <form [formGroup]="loginForm" class="login-form" (ngSubmit)="login()">

      <div class="form-field">
        <label class="field-label">Email</label>
        <input
          class="form-input"
          [class.input-error]="campoInvalido('email')"
          formControlName="email"
          type="email"
          placeholder="tu@email.com"
          autocomplete="email"
        />
        <ng-container *ngIf="campoInvalido('email')">
          <p class="error-message" *ngIf="loginForm.get('email')?.errors?.['required']">
            El email es obligatorio
          </p>
          <p class="error-message" *ngIf="loginForm.get('email')?.errors?.['email']">
            Ingresá un email válido
          </p>
        </ng-container>
      </div>

      <div class="form-field">
        <label class="field-label">Contraseña</label>
        <div class="password-wrapper">
          <input
            class="form-input password-input"
            [class.input-error]="campoInvalido('password')"
            formControlName="password"
            [type]="mostrarPassword ? 'text' : 'password'"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="toggle-password"
            (click)="mostrarPassword = !mostrarPassword"
          >
            <ion-icon [name]="mostrarPassword ? 'eye-off-outline' : 'eye-outline'"></ion-icon>
          </button>
        </div>
        <p class="error-message" *ngIf="campoInvalido('password') && loginForm.get('password')?.errors?.['required']">
          La contraseña es obligatoria
        </p>
      </div>

      <button
        type="submit"
        class="btn-login"
        [disabled]="cargando"
      >
        <span *ngIf="!cargando">Ingresar</span>
        <span *ngIf="cargando">Ingresando...</span>
      </button>

    </form>
  </div>
</ion-content>
